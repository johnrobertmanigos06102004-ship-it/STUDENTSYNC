<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentSync - Consolidated Cloud Information Management System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Alpine.js CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Supabase JS Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        [x-cloak] { display: none !important; }
        
        .ctu-seal-img {
            width: 6.5rem; 
            height: auto; 
            max-width: 100%; 
            object-fit: contain; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            background-color: transparent;
            transition: all 0.2s ease-in-out;
        }

        @media (min-width: 640px) {
            .ctu-seal-img {
                width: 8rem; 
            }
        }
    </style>
</head>
<body class="bg-slate-900 font-sans text-gray-800 antialiased min-h-screen" x-data="trackerApp()">

    <!-- LOADING SCREEN INTERFACES -->
    <div x-show="isLoading" class="fixed inset-0 bg-slate-950/80 z-50 flex flex-col items-center justify-center text-white" x-cloak>
        <div class="w-12 h-12 border-4 border-t-orange-500 border-slate-700 rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-mono tracking-widest uppercase text-slate-400">Processing Database Request...</p>
    </div>

    <!-- AUTHENTICATION SCREEN -->
    <div x-show="!isLoggedIn" class="min-h-screen flex items-center justify-center px-4 py-12" x-cloak>
        <div class="max-w-md w-full space-y-6 bg-white p-8 rounded-2xl shadow-2xl relative z-10 border border-gray-100">
            <div class="text-center">
                <div class="flex flex-col items-center justify-center gap-4">
                    <img class="ctu-seal-img" src="ctu.png" alt="App Logo">
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mt-1">StudentSync</h1>
                </div>
                <div class="flex items-center justify-center gap-1 text-orange-600 font-black text-xl mt-1 tracking-widest animate-pulse">≫≫</div>
                <p class="mt-2 text-center text-sm text-gray-600" x-text="authMode === 'login' ? 'Access your cloud database gateway' : 'Register a cloud administrator account'"></p>
            </div>

            <div x-show="authMode === 'login'" class="bg-slate-100 p-1 rounded-xl grid grid-cols-2 text-center text-xs font-bold transition shadow-inner">
                <button type="button" @click="selectedRole = 'admin'; authMessage = ''" :class="selectedRole === 'admin' ? 'bg-white text-orange-600 shadow-xs' : 'text-gray-500 hover:text-gray-900'" class="py-2 rounded-lg transition cursor-pointer">🛠️ Administrator</button>
                <button type="button" @click="selectedRole = 'student'; authMessage = ''" :class="selectedRole === 'student' ? 'bg-white text-orange-600 shadow-xs' : 'text-gray-500 hover:text-gray-900'" class="py-2 rounded-lg transition cursor-pointer">🎓 Student Gateway</button>
            </div>
            
            <div x-show="authMessage" x-text="authMessage" :class="isError ? 'bg-red-50 border border-red-200 text-red-700' : 'bg-emerald-50 border border-emerald-200 text-emerald-700'" class="px-4 py-3 rounded-lg text-sm transition-all"></div>

            <form x-show="authMode === 'login'" class="space-y-4" @submit.prevent="handleLogin()">
                <template x-if="selectedRole === 'admin'">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Admin Email Address</label>
                            <input type="email" x-model="loginForm.email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:outline-hidden" placeholder="admin@example.com">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Password</label>
                            <input type="password" x-model="loginForm.password" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:outline-hidden" placeholder="••••••••">
                        </div>
                    </div>
                </template>

                <template x-if="selectedRole === 'student'">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Assigned Student ID Number</label>
                            <input type="text" x-model="studentLoginForm.studentId" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:outline-hidden" placeholder="e.g., STU-2026-001">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Last Name</label>
                            <input type="text" x-model="studentLoginForm.lastName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:outline-hidden" placeholder="e.g., Manigos">
                        </div>
                    </div>
                </template>

                <button type="submit" :class="selectedRole === 'student' ? 'bg-orange-600 hover:bg-orange-700' : 'bg-slate-900 hover:bg-slate-800'" class="w-full py-2.5 px-4 text-sm font-semibold rounded-lg text-white transition shadow-md cursor-pointer">Sign In to Cloud Space</button>
                <p x-show="selectedRole === 'admin'" class="text-center text-sm text-gray-600 mt-2">Need a shared admin cloud node? <button type="button" @click="switchMode('signup')" class="font-medium text-orange-600 hover:text-orange-500 cursor-pointer">Sign Up</button></p>
            </form>

            <form x-show="authMode === 'signup'" class="space-y-4" @submit.prevent="handleSignUp()" style="display: none;">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Admin Email Address</label>
                    <input type="email" x-model="signUpForm.email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:outline-hidden" placeholder="admin@example.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Create Secure Password</label>
                    <input type="password" x-model="signUpForm.password" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:outline-hidden" placeholder="Minimum 6 characters">
                </div>
                <button type="submit" class="w-full py-2.5 px-4 text-sm font-semibold rounded-lg text-white bg-emerald-600 hover:bg-emerald-700 transition shadow-md cursor-pointer">Initialize Cloud Admin Account</button>
                <p class="text-center text-sm text-gray-600 mt-2">Already registered? <button type="button" @click="switchMode('login')" class="font-medium text-orange-600 hover:text-orange-500 cursor-pointer">Sign In</button></p>
            </form>
        </div>
    </div>

    <!-- PORTAL WORKING HOUSING -->
    <div x-show="isLoggedIn" class="flex min-h-screen relative bg-slate-50" style="display: none;" x-cloak>
        <!-- Mobile Sidebar Overlay -->
        <div x-show="isSidebarOpen" @click="isSidebarOpen = false" class="fixed inset-0 bg-slate-950/50 z-40 transition-opacity" x-cloak></div>

        <!-- SIDEBAR CONTAINER -->
        <aside class="fixed inset-y-0 left-0 w-80 bg-slate-900 text-white p-5 z-50 transform transition-transform duration-300 flex flex-col justify-between shadow-2xl overflow-y-auto" :class="isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:static lg:h-screen'">
            <div class="space-y-6">
                <div class="flex flex-col border-b border-slate-800 pb-4 gap-3">
                    <div class="flex items-center justify-between w-full">
                        <div class="flex items-center gap-3">
                            <img class="ctu-seal-img !w-12 !shadow-none" src="ctu.png" alt="App Logo">
                            <h1 class="text-xl font-bold text-orange-400 tracking-wider">StudentSync</h1>
                        </div>
                        <button @click="isSidebarOpen = false" class="lg:hidden text-slate-400 hover:text-white px-2 py-1 text-xs font-semibold border border-slate-700 hover:border-slate-500 rounded-lg transition cursor-pointer">&larr;</button>
                    </div>
                    <span class="text-[10px] uppercase font-bold tracking-widest px-2 py-0.5 bg-slate-800 rounded-sm text-slate-400 block w-max" x-text="activeSessionRole + ' instance'"></span>
                </div>
                
                <!-- Navigation -->
                <nav class="space-y-2">
                    <template x-if="activeSessionRole === 'admin'">
                        <div class="space-y-2">
                            <button @click="currentView = 'dashboard'; isSidebarOpen = false;" :class="currentView === 'dashboard' ? 'bg-orange-600 text-white' : 'text-slate-300 hover:bg-slate-800'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-sm transition text-left cursor-pointer"><span>📋</span> Control Hub Dashboard</button>
                            <button @click="currentView = 'programs'; isSidebarOpen = false" :class="currentView === 'programs' ? 'bg-orange-600 text-white' : 'text-slate-300 hover:bg-slate-800'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-sm transition text-left cursor-pointer"><span>🌿</span> Program / Section Roster</button>
                        </div>
                    </template>
                    <template x-if="activeSessionRole === 'student'">
                        <div class="space-y-2">
                            <button @click="currentView = 'dashboard'; isSidebarOpen = false" :class="currentView === 'dashboard' ? 'bg-orange-600 text-white' : 'text-slate-300 hover:bg-slate-800'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-sm transition text-left cursor-pointer"><span>👤</span> Account Status</button>
                        </div>
                    </template>
                </nav>

                <!-- RESTORED & ALIGNED ENTRY FORM MOVED TO THE SIDEBAR -->
                <template x-if="activeSessionRole === 'admin'">
                    <div class="border-t border-slate-800 pt-4 space-y-4">
                        <div class="flex justify-between items-center">
                            <div class="text-[11px] uppercase tracking-wider font-bold text-slate-400" x-text="editingStudentId ? '⚡ Edit Student Config' : '📝 Append Student Entry'"></div>
                            <button type="button" x-show="editingStudentId" @click="resetForm()" class="text-[10px] bg-slate-800 hover:bg-slate-700 px-2 py-0.5 rounded text-gray-300 font-semibold">Cancel</button>
                        </div>

                        <form @submit.prevent="commitStudentForm()" class="space-y-3 text-slate-300">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-1">Assign Student ID Number</label>
                                <input type="text" x-model="form.student_id" :disabled="editingStudentId" placeholder="e.g., STU-2026-001" required class="w-full px-2.5 py-1.5 border border-slate-700 bg-slate-800 rounded-lg text-xs font-semibold text-white focus:outline-hidden focus:ring-2 focus:ring-orange-500 disabled:opacity-50">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-1">Full Student Name</label>
                                <input type="text" x-model="form.name" placeholder="e.g., Johnro E." required class="w-full px-2.5 py-1.5 border border-slate-700 bg-slate-800 rounded-lg text-xs font-semibold text-white focus:outline-hidden focus:ring-2 focus:ring-orange-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-1">Contact Email</label>
                                <input type="email" x-model="form.email" placeholder="student@example.com" required class="w-full px-2.5 py-1.5 border border-slate-700 bg-slate-800 rounded-lg text-xs font-semibold text-white focus:outline-hidden focus:ring-2 focus:ring-orange-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-1">Program / Section Assignment</label>
                                <select x-model="form.program_section" required class="w-full px-2.5 py-1.5 border border-slate-700 bg-slate-800 rounded-lg text-xs font-semibold text-white focus:outline-hidden focus:ring-2 focus:ring-orange-500">
                                    <option value="" class="text-slate-400">e.g., BSIT-4A-G1</option>
                                    <template x-for="section in getUniqueSections()" :key="section">
                                        <option :value="section" x-text="section" class="text-white bg-slate-800"></option>
                                    </template>
                                </select>
                            </div>

                            <!-- Architecture Nested Container inside Sidebar -->
                            <div class="border border-slate-800 bg-slate-950/40 rounded-xl p-3 space-y-2.5">
                                <div class="text-[9px] font-extrabold text-orange-400 uppercase tracking-wider">Custom Document Architecture Setup</div>
                                <div>
                                    <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-tight mb-0.5">Custom Requirement Name</label>
                                    <input type="text" x-model="form.document_name" placeholder="e.g., Embedded Systems Portfolio" class="w-full px-2 py-1 border border-slate-700 bg-slate-800 rounded-md text-xs font-semibold text-white focus:outline-hidden focus:ring-2 focus:ring-orange-500">
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-tight mb-0.5">Document Control Number / Code</label>
                                    <input type="text" x-model="form.document_code" placeholder="e.g., DOC-CTRL-992" class="w-full px-2 py-1 border border-slate-700 bg-slate-800 rounded-md text-xs font-semibold text-white focus:outline-hidden focus:ring-2 focus:ring-orange-500">
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-tight mb-0.5">Custom Timeline Schedule Info</label>
                                    <input type="text" x-model="form.schedule_info" placeholder="e.g., Mon/Wed 09:00 AM" class="w-full px-2 py-1 border border-slate-700 bg-slate-800 rounded-md text-xs font-semibold text-white focus:outline-hidden focus:ring-2 focus:ring-orange-500">
                                </div>
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-1">File Inspection Compliance Status</label>
                                <select x-model="form.status" class="w-full px-2.5 py-1.5 border border-slate-700 bg-slate-800 rounded-lg text-xs font-semibold text-white focus:outline-hidden focus:ring-2 focus:ring-orange-500">
                                    <option value="Complete" class="text-white bg-slate-800">Complete (Clear Status)</option>
                                    <option value="Lockings" class="text-white bg-slate-800">Lockings (Has Outstanding)</option>
                                </select>
                            </div>
                            
                            <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 rounded-lg text-xs tracking-wide shadow transition cursor-pointer">Commit Structural Update to Cloud</button>
                        </form>
                    </div>
                </template>

                <!-- SECTION BUILDER TAGS ACCORDION LAYER IN SIDEBAR -->
                <template x-if="activeSessionRole === 'admin'">
                    <div class="border-t border-slate-800 pt-4 space-y-3">
                        <div class="text-[11px] uppercase tracking-wider font-bold text-slate-400">Section Options Management</div>
                        <div class="flex flex-col gap-1.5">
                            <input type="text" x-model="newSectionInput" placeholder="Add section identifier..." class="w-full px-2.5 py-1.5 border border-slate-700 bg-slate-800 rounded-lg text-xs font-semibold text-white placeholder-slate-500 focus:outline-hidden focus:ring-2 focus:ring-orange-500">
                            <button type="button" @click="addNewSectionSlot()" class="w-full bg-slate-800 hover:bg-slate-700 text-orange-400 font-bold text-xs py-1.5 rounded-lg transition border border-slate-700 cursor-pointer">➕ Create Option</button>
                        </div>
                        
                        <div class="space-y-1 pt-1 max-h-32 overflow-y-auto pr-1">
                            <template x-for="sect in customSections" :key="sect">
                                <div class="bg-slate-800/60 px-2 py-1 rounded text-[11px] flex justify-between items-center text-slate-300 border border-slate-800">
                                    <span x-text="sect"></span>
                                    <button @click="removeSectionSlot(sect)" class="text-red-400 hover:text-red-600 font-bold bg-slate-900/40 px-1 rounded transition cursor-pointer">✕</button>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

            <div class="border-t border-slate-800 pt-4 mt-6">
                <button @click="handleLogout()" class="w-full flex items-center gap-3 px-4 py-2 text-xs rounded-xl text-red-400 hover:bg-slate-800 hover:text-red-300 transition cursor-pointer"><span>🚪</span> Disconnect Session</button>
            </div>
        </aside>

        <!-- MAIN CONTENT WORKSPACE -->
        <div class="flex-1 flex flex-col min-w-0">
            <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center gap-4 justify-between shrink-0 shadow-xs">
                <div class="flex items-center gap-4">
                    <button @click="isSidebarOpen = !isSidebarOpen" class="lg:hidden bg-slate-950 text-white hover:bg-slate-800 px-4 py-2 rounded-xl text-sm font-semibold transition shadow-sm flex items-center gap-2 cursor-pointer"><span>☰</span> Menu</button>
                    <div class="flex items-center gap-4">
                        <img class="ctu-seal-img !w-14 sm:!w-16 !shadow-none" src="ctu.png" alt="App Logo">
                        <h2 class="text-xl font-bold text-slate-900 tracking-tight">Academic Cloud Workspace</h2>
                    </div>
                </div>
                <div class="text-xs bg-emerald-50 border border-emerald-100 text-emerald-700 px-3 py-1.5 rounded-full font-bold uppercase tracking-wider">☁️ Cloud Connected</div>
            </header>

            <main class="flex-1 p-6 bg-slate-50/50 overflow-y-auto">
                <!-- VIEW 1: HUB DASHBOARD -->
                <div x-show="currentView === 'dashboard'" class="space-y-6" x-cloak>
                    <!-- ADMIN OPERATIONS VIEW -->
                    <template x-if="activeSessionRole === 'admin'">
                        <div class="space-y-6">
                            
                            <!-- STATS COUNTER BLOCKS -->
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm">
                                    <div class="text-xs font-bold text-gray-400 uppercase tracking-wider">Cloud Records Found</div>
                                    <div class="text-3xl font-black text-gray-900 mt-1" x-text="students ? students.length : 0">0</div>
                                </div>
                                <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm">
                                    <div class="text-xs font-bold text-gray-400 uppercase tracking-wider">Pending Lockings Alerts</div>
                                    <div class="text-3xl font-black text-red-600 mt-1" x-text="students ? students.filter(s => s.status !== 'Complete').length : 0">0</div>
                                </div>
                            </div>

                            <!-- SEARCH BAR CONTROL -->
                            <div class="bg-white p-4 rounded-xl border border-gray-200 flex flex-col sm:flex-row justify-between gap-4 items-center shadow-xs">
                                <div class="relative w-full sm:w-80">
                                    <input type="text" x-model="searchQuery" placeholder="Search entries, ID numbers, parameters..." class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:outline-hidden bg-slate-50">
                                </div>
                                <div class="text-xs text-slate-400 font-medium italic">Use the sidebar config menu anytime to record adjustments</div>
                            </div>

                            <!-- TABLE MATRIX DISPLAY -->
                            <div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left border-collapse">
                                        <thead class="bg-gray-50 border-b border-gray-200 text-[11px] font-bold text-gray-500 uppercase tracking-wider">
                                            <tr>
                                                <th class="px-6 py-4">Assigned ID Number</th>
                                                <th class="px-6 py-4">Full Student Name</th>
                                                <th class="px-6 py-4">Program / Section</th>
                                                <th class="px-6 py-4">Arch. Details</th>
                                                <th class="px-6 py-4">Document Compliance</th>
                                                <th class="px-6 py-4 text-right">Cloud Config</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-gray-200 text-sm">
                                            <template x-for="student in filteredStudents()" :key="student.id">
                                                <tr class="hover:bg-slate-50/70 transition">
                                                    <td class="px-6 py-4 font-mono font-bold text-orange-600 text-xs" x-text="student.student_id"></td>
                                                    <td class="px-6 py-4 font-bold text-gray-900" x-text="student.name"></td>
                                                    <td class="px-6 py-4 font-semibold text-slate-700" x-text="student.program_section || 'Unassigned'"></td>
                                                    <td class="px-6 py-4 text-xs space-y-0.5 text-gray-500">
                                                        <div class="font-medium text-slate-800" x-text="student.document_name ? '📝 ' + student.document_name : ''"></div>
                                                        <div x-text="student.document_code ? '🆔 ' + student.document_code : ''"></div>
                                                        <div class="italic text-[11px]" x-text="student.schedule_info ? '⏰ ' + student.schedule_info : ''"></div>
                                                    </td>
                                                    <td class="px-6 py-4">
                                                        <span :class="student.status === 'Complete' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-rose-50 text-rose-700 border-rose-200'" class="px-2.5 py-1 text-xs font-bold rounded-full border" x-text="student.status === 'Complete' ? '✅ Complete' : '⚠️ Has Lockings'"></span>
                                                    </td>
                                                    <td class="px-6 py-4 text-right space-x-3 whitespace-nowrap">
                                                        <button @click="startEditStudent(student)" class="text-orange-600 hover:text-orange-900 font-bold text-xs underline cursor-pointer">Modify</button>
                                                        <button @click="deleteStudent(student.id)" class="text-red-500 hover:text-red-700 font-bold text-xs underline cursor-pointer">Delete</button>
                                                    </td>
                                                </tr>
                                            </template>
                                            <template x-if="!students || students.length === 0">
                                                <tr>
                                                    <td colspan="6" class="px-6 py-8 text-center text-xs text-gray-400 italic">No records stored in the remote table yet. Set configuration settings parameters in your left side panel structure!</td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- READ-ONLY STUDENT PERFORMANCE VIEW -->
                    <template x-if="activeSessionRole === 'student'">
                        <div class="space-y-6 max-w-4xl mx-auto">
                            <div class="bg-slate-900 rounded-2xl p-6 text-white shadow-md border border-orange-500/20 flex items-center gap-5">
                                <img class="ctu-seal-img !w-20 sm:!w-24" src="ctu.png" alt="App Logo">
                                <div>
                                    <h3 class="text-xl font-bold">Welcome back, <span x-text="studentUserMeta.name"></span>!</h3>
                                    <p class="text-xs text-orange-200 mt-1" x-text="'Verified Cloud Identity: ' + studentUserMeta.student_id"></p>
                                    <p class="text-xs text-slate-300 font-mono mt-0.5" x-text="'Registered Section: ' + (studentUserMeta.program_section || 'Unassigned Section')"></p>
                                    <div class="mt-3 pt-3 border-t border-slate-800 text-xs text-slate-400 space-y-1" x-show="studentUserMeta.document_name">
                                        <div class="font-bold text-slate-300 uppercase tracking-wider text-[10px]">Your Requirement Architecture:</div>
                                        <div x-text="'Target Assignment: ' + studentUserMeta.document_name"></div>
                                        <div x-text="'Control Code: ' + studentUserMeta.document_code"></div>
                                        <div x-text="'Assigned Timeline: ' + studentUserMeta.schedule_info"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- VIEW 2: SECTIONS ROSTER -->
                <div x-show="currentView === 'programs'" class="space-y-6" x-cloak style="display: none;">
                    <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-xs">
                        <div class="border-b border-gray-100 pb-4 mb-4">
                            <h3 class="text-lg font-bold text-slate-900">Program & Section Roster</h3>
                            <p class="text-xs text-gray-500">Overview of student distributions across configured sections.</p>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <template x-for="sectionName in getUniqueSections()" :key="sectionName">
                                <div class="border border-gray-200 rounded-xl p-4 bg-slate-50/50 relative">
                                    <div class="flex justify-between items-center border-b border-gray-200 pb-2 mb-3">
                                        <span class="font-bold text-slate-900 text-sm" x-text="sectionName"></span>
                                        <span class="text-xs font-bold bg-orange-100 text-orange-800 px-2.5 py-0.5 rounded-full" x-text="students.filter(s => s.program_section === sectionName).length + ' Members' "></span>
                                    </div>
                                    <ul class="space-y-2 max-h-48 overflow-y-auto pr-1">
                                        <template x-for="st in students.filter(s => s.program_section === sectionName)" :key="st.id">
                                            <li class="bg-white p-2 rounded border border-gray-100 text-xs flex justify-between items-center">
                                                <div class="flex flex-col">
                                                    <span class="font-medium text-gray-800" x-text="st.name"></span>
                                                    <span class="text-[10px] text-gray-400" x-text="st.document_name ? st.document_name : 'No design architecture data'"></span>
                                                </div>
                                                <span :class="st.status === 'Complete' ? 'text-emerald-600' : 'text-rose-600 font-bold'" x-text="st.status === 'Complete' ? 'Clear' : 'Lockings'"></span>
                                            </li>
                                        </template>
                                        <template x-if="students.filter(s => s.program_section === sectionName).length === 0">
                                            <li class="text-center text-[11px] text-gray-400 italic py-2">No students assigned to this section yet.</li>
                                        </template>
                                    </ul>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Script Application Cloud Core Integration Logic -->
    <script>
        const SUPABASE_URL = "https://omgtnmdhzsviuqnbtraj.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_r7PIcJNOFyBHGrq5kyOxMg_xyzhd5Eg";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function trackerApp() {
            return {
                isSidebarOpen: false,
                currentView: 'dashboard', 
                isLoading: false,

                selectedRole: 'admin', 
                activeSessionRole: sessionStorage.getItem('activeSessionRole') || '',
                isLoggedIn: sessionStorage.getItem('isLoggedIn') === 'true',
                authMode: 'login', 
                
                loginForm: { email: '', password: '' },
                signUpForm: { email: '', password: '' },
                studentLoginForm: { studentId: '', lastName: '' },
                authMessage: '', isError: false,

                studentUserMeta: JSON.parse(sessionStorage.getItem('studentUserMeta')) || {}, 
                students: [],
                searchQuery: '',
                newSectionInput: '',
                customSections: JSON.parse(localStorage.getItem('custom_sections')) || ['BSIT-4A-G1', 'BSIT-4B-G2'],
                
                form: { student_id: '', name: '', email: '', program_section: '', document_name: '', document_code: '', schedule_info: '', status: 'Lockings' },
                editingStudentId: null,

                async init() {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (session && this.activeSessionRole === 'admin') {
                        this.isLoggedIn = true;
                        await this.fetchCloudRecords();
                    } else if (this.isLoggedIn && this.activeSessionRole === 'student') {
                        await this.fetchCloudRecords();
                    }
                },

                switchMode(mode) {
                    this.authMode = mode;
                    this.authMessage = '';
                },

                async handleSignUp() {
                    this.isLoading = true;
                    const { data, error } = await supabaseClient.auth.signUp({
                        email: this.signUpForm.email,
                        password: this.signUpForm.password,
                    });
                    this.isLoading = false;
                    if (error) {
                        this.setMessage(error.message, true);
                    } else {
                        this.setMessage('Admin registered! Clear login options to check instance access.', false);
                        this.switchMode('login');
                    }
                },

                async handleLogin() {
                    this.isLoading = true;
                    this.authMessage = '';

                    if (this.selectedRole === 'student') {
                        const enteredId = this.studentLoginForm.studentId.trim();
                        const enteredLastName = this.studentLoginForm.lastName.trim().toLowerCase();

                        const { data, error } = await supabaseClient
                            .from('students')
                            .select('*')
                            .eq('student_id', enteredId);

                        this.isLoading = false;
                        if (error) {
                            this.setMessage('Database connection error checking student index.', true);
                            return;
                        }

                        if (data && data.length > 0) {
                            const record = data[0];
                            const nameParts = record.name.trim().split(' ');
                            const recordLastName = nameParts[nameParts.length - 1].toLowerCase();

                            if (recordLastName === enteredLastName) {
                                const localMapping = JSON.parse(localStorage.getItem('student_sections')) || {};
                                const localArchMapping = JSON.parse(localStorage.getItem('student_architecture')) || {};
                                
                                record.program_section = localMapping[record.student_id] || '';
                                const meta = localArchMapping[record.student_id] || {};
                                record.document_name = meta.document_name || '';
                                record.document_code = meta.document_code || '';
                                record.schedule_info = meta.schedule_info || '';

                                this.isLoggedIn = true;
                                this.activeSessionRole = 'student';
                                this.studentUserMeta = record;

                                sessionStorage.setItem('isLoggedIn', 'true');
                                sessionStorage.setItem('activeSessionRole', 'student');
                                sessionStorage.setItem('studentUserMeta', JSON.stringify(record));
                                this.currentView = 'dashboard';
                            } else {
                                this.setMessage('Last Name matching verification rejected.', true);
                            }
                        } else {
                            this.setMessage('No student record found with that cloud matching ID key.', true);
                        }
                        return;
                    }

                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: this.loginForm.email,
                        password: this.loginForm.password
                    });

                    if (error) {
                        this.isLoading = false;
                        this.setMessage(error.message, true);
                    } else {
                        this.activeSessionRole = 'admin';
                        this.isLoggedIn = true;
                        sessionStorage.setItem('isLoggedIn', 'true');
                        sessionStorage.setItem('activeSessionRole', 'admin');
                        await this.fetchCloudRecords();
                        this.isLoading = false;
                        this.currentView = 'dashboard';
                    }
                },

                async fetchCloudRecords() {
                    this.isLoading = true;
                    try {
                        const { data, error } = await supabaseClient
                            .from('students')
                            .select('*')
                            .order('created_at', { ascending: false });

                        if (!error && data) {
                            const localMapping = JSON.parse(localStorage.getItem('student_sections')) || {};
                            const localArchMapping = JSON.parse(localStorage.getItem('student_architecture')) || {};
                            
                            this.students = data.map(s => {
                                const arch = localArchMapping[s.student_id] || {};
                                return {
                                    ...s,
                                    program_section: localMapping[s.student_id] || '',
                                    document_name: arch.document_name || '',
                                    document_code: arch.document_code || '',
                                    schedule_info: arch.schedule_info || ''
                                };
                            });
                        } else {
                            this.students = [];
                        }
                    } catch (e) {
                        console.error(e);
                        this.students = [];
                    } finally {
                        this.isLoading = false;
                    }
                },

                async handleLogout() {
                    await supabaseClient.auth.signOut();
                    this.isLoggedIn = false;
                    this.activeSessionRole = '';
                    this.studentUserMeta = {};
                    sessionStorage.clear();
                    this.switchMode('login');
                },

                setMessage(text, errorStatus) {
                    this.authMessage = text;
                    this.isError = errorStatus;
                },

                resetForm() {
                    this.editingStudentId = null;
                    this.form = { student_id: '', name: '', email: '', program_section: '', document_name: '', document_code: '', schedule_info: '', status: 'Lockings' };
                },

                startEditStudent(student) {
                    this.editingStudentId = student.id;
                    this.form = {
                        student_id: student.student_id,
                        name: student.name,
                        email: student.email,
                        program_section: student.program_section || '',
                        document_name: student.document_name || '',
                        document_code: student.document_code || '',
                        schedule_info: student.schedule_info || '',
                        status: student.status
                    };
                    // Ensure layout opens sidebar or scrolls layout smoothly if modified on tiny screens
                    if (window.innerWidth < 1024) {
                        this.isSidebarOpen = true;
                    }
                },

                async commitStudentForm() {
                    this.isLoading = true;
                    
                    const studentPayload = {
                        student_id: this.form.student_id,
                        name: this.form.name,
                        email: this.form.email,
                        status: this.form.status
                    };

                    let error = null;

                    if (this.editingStudentId) {
                        const res = await supabaseClient
                            .from('students')
                            .update(studentPayload)
                            .eq('id', this.editingStudentId);
                        error = res.error;
                    } else {
                        const res = await supabaseClient
                            .from('students')
                            .insert([studentPayload]);
                        error = res.error;
                    }

                    if (error) {
                        this.isLoading = false;
                        alert("🚨 SUPABASE ERROR: Could not commit student profile.\n\nReason: " + error.message);
                    } else {
                        const localMapping = JSON.parse(localStorage.getItem('student_sections')) || {};
                        localMapping[this.form.student_id] = this.form.program_section;
                        localStorage.setItem('student_sections', JSON.stringify(localMapping));

                        const localArchMapping = JSON.parse(localStorage.getItem('student_architecture')) || {};
                        localArchMapping[this.form.student_id] = {
                            document_name: this.form.document_name,
                            document_code: this.form.document_code,
                            schedule_info: this.form.schedule_info
                        };
                        localStorage.setItem('student_architecture', JSON.stringify(localArchMapping));

                        await this.fetchCloudRecords();
                        this.resetForm();
                    }
                },

                async deleteStudent(id) {
                    if (confirm("Permanently erase this data record row from the remote cloud?")) {
                        this.isLoading = true;
                        
                        const targetStudent = this.students.find(s => s.id === id);
                        if (targetStudent) {
                            const localMapping = JSON.parse(localStorage.getItem('student_sections')) || {};
                            delete localMapping[targetStudent.student_id];
                            localStorage.setItem('student_sections', JSON.stringify(localMapping));

                            const localArchMapping = JSON.parse(localStorage.getItem('student_architecture')) || {};
                            delete localArchMapping[targetStudent.student_id];
                            localStorage.setItem('student_architecture', JSON.stringify(localArchMapping));
                        }

                        await supabaseClient.from('students').delete().eq('id', id);
                        await this.fetchCloudRecords();
                    }
                },

                addNewSectionSlot() {
                    const cleaned = this.newSectionInput.trim();
                    if (!cleaned) return alert("Please type a section designation identifier.");
                    if (this.customSections.includes(cleaned)) return alert("This Section profile already exists.");
                    this.customSections.push(cleaned);
                    localStorage.setItem('custom_sections', JSON.stringify(this.customSections));
                    this.newSectionInput = '';
                },

                removeSectionSlot(sectionName) {
                    const count = this.students.filter(s => s.program_section === sectionName).length;
                    if (count > 0) return alert("Cannot delete active section filled with student profiles.");
                    this.customSections = this.customSections.filter(s => s !== sectionName);
                    localStorage.setItem('custom_sections', JSON.stringify(this.customSections));
                },

                getUniqueSections() {
                    const activeDbSections = this.students.map(s => s.program_section).filter(Boolean);
                    return [...new Set([...this.customSections, ...activeDbSections])];
                },

                filteredStudents() {
                    if (!this.students) return [];
                    return this.students.filter(s => {
                        if (!s || !s.name) return false;
                        const query = this.searchQuery.toLowerCase();
                        return s.name.toLowerCase().includes(query) || 
                               s.student_id.toLowerCase().includes(query) ||
                               (s.program_section && s.program_section.toLowerCase().includes(query)) ||
                               (s.document_name && s.document_name.toLowerCase().includes(query));
                    });
                }
            }
        }
    </script>
</body>
